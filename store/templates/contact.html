{% extends 'base.html' %}
{% block content %}

<div class="max-w-2xl mx-auto py-16 px-6">
    <h1 class="text-3xl font-bold text-amber-700 mb-8 text-center">
        Contact Us
    </h1>

    <form method="post" class="bg-white p-8 shadow-lg rounded-xl space-y-6">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit"
            class="w-full bg-orange-600 hover:bg-orange-700 text-white py-3 rounded-lg font-medium transition duration-300">
            Send Message
        </button>
    </form>
</div>

{% endblock %}
