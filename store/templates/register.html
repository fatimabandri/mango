{% extends 'base.html' %}
{% block content %}

<div class="max-w-md mx-auto mt-16 bg-white p-8 shadow rounded">
    <h2 class="text-2xl font-bold mb-6 text-center">Register</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="w-full bg-orange-600 text-white py-2 rounded mt-4">
            Create Account
        </button>
    </form>
</div>

{% endblock %}
