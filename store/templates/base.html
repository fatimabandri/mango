<!DOCTYPE html>
<html>

<head>
    <title>Ratnagiri Mango</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-amber-50">

    <!-- PREMIUM NAVBAR -->
    <nav class="bg-white/90 backdrop-blur-md shadow-md sticky top-0 z-50 border-b border-orange-100">
        <div class="max-w-7xl mx-auto px-6">

            <div class="flex justify-between items-center py-4">

                <!-- Logo -->
                <div class="flex items-center space-x-2">
                    <span class="text-3xl">🥭</span>
                    <span class="text-2xl font-bold text-orange-600 tracking-wide">
                        Ratnagiri Mango
                    </span>
                </div>

                <!-- Search Bar (Desktop) -->
                <div class="hidden md:flex flex-1 mx-10">
                    <div class="relative w-full">
                        <input type="text" placeholder="Search premium mangoes..."
                            class="w-full border-2 border-gray-300 rounded-full px-5 py-2 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 outline-none transition">

                        <!-- Search Icon -->
                        <span class="absolute right-4 top-2.5 text-gray-400">
                            🔍
                        </span>
                    </div>
                </div>

                <!-- Menu Links -->
                <div class="hidden md:flex items-center space-x-8">

                    <a href="/" class="text-gray-700 hover:text-orange-600 font-medium transition">
                        Home
                    </a>

                    <a href="/order/" class="text-gray-700 hover:text-orange-600 font-medium transition">
                        Order
                    </a>

                    <a href="#" class="text-gray-700 hover:text-orange-600 font-medium transition">
                        About
                    </a>

                    <a href="#" class="text-gray-700 hover:text-orange-600 font-medium transition">
                        Contact
                    </a>

                    <!-- Cart -->
                    <a href="#" class="relative text-gray-700 hover:text-orange-600 text-xl transition">
                        🛒
                    </a>

                    <!-- Login -->
                    <a href="/admin/"
                        class="bg-gradient-to-r from-orange-500 to-amber-600 hover:from-orange-600 hover:to-amber-700 text-white px-5 py-2 rounded-full shadow-md transition">
                        Login
                    </a>

                </div>

                <!-- Mobile Button -->
                <div class="md:hidden">
                    <button id="menu-btn" class="text-2xl text-orange-600">
                        ☰
                    </button>
                </div>

            </div>

            <!-- Mobile Menu -->
            <div id="mobile-menu" class="hidden md:hidden pb-4 space-y-3">

                <!-- Mobile Search -->
                <input type="text" placeholder="Search mangoes..."
                    class="w-full border-2 border-gray-300 rounded-full px-5 py-2 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 outline-none">

                <a href="/" class="block text-gray-700 hover:text-orange-600">Home</a>
                <a href="/order/" class="block text-gray-700 hover:text-orange-600">Order</a>
                <a href="#" class="block text-gray-700 hover:text-orange-600">About</a>
                <a href="#" class="block text-gray-700 hover:text-orange-600">Contact</a>

                <a href="/admin/" class="block text-center bg-orange-500 text-white px-4 py-2 rounded-full">
                    Login
                </a>
            </div>

        </div>
    </nav>

    {% block content %}{% endblock %}

    <script>
        const btn = document.getElementById("menu-btn");
        const menu = document.getElementById("mobile-menu");

        btn.addEventListener("click", () => {
            menu.classList.toggle("hidden");
        });
    </script>

</body>

</html>
